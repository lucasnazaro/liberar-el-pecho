<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pecho Libre — Asistente</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--cream2:#EDE8DE;--warm:#C8B89A;--text:#1A1410;--text2:#5C4F3D;--text3:#8C7B6A;--accent:#2D5A4B;--accent2:#3D7A63;--accent-light:rgba(45,90,75,.08);--border:rgba(90,70,50,.12);--shadow:0 2px 24px rgba(26,20,16,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;z-index:10;flex-shrink:0;box-shadow:0 1px 12px rgba(26,20,16,.06)}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4A9B7F);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-info{flex:1}
.header-name{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--text)}
.header-status{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-top:2px}
.status-dot{width:5px;height:5px;border-radius:50%;background:#4CAF50;animation:pd 2s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.5}}
.chat-area{flex:1;overflow-y:auto;padding:24px 16px 16px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.msg-row{display:flex;align-items:flex-end;gap:8px;opacity:0;transform:translateY(10px);animation:mi .35s ease forwards}
@keyframes mi{to{opacity:1;transform:translateY(0)}}
.msg-row.user{justify-content:flex-end}
.bot-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#4A9B7F);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bubble{max-width:min(78%,340px);padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6}
.bubble.user{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bubble.bot{background:#fff;color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.btime{font-family:'JetBrains Mono',monospace;font-size:8px;margin-top:5px;opacity:.6}
.ebook-card{background:linear-gradient(135deg,#2D5A4B,#1a3d31);border-radius:16px;padding:20px;color:#fff;max-width:min(82%,360px);box-shadow:0 4px 24px rgba(45,90,75,.3)}
.ebook-title{font-family:'Fraunces',serif;font-size:17px;margin-bottom:8px}
.ebook-btn{display:inline-block;background:#fff;color:var(--accent);font-weight:600;font-size:13px;padding:10px 20px;border-radius:100px;text-decoration:none;margin-top:10px}
.typing-bubble{background:#fff;border-radius:18px;padding:14px 18px;display:flex;gap:4px}
.td{width:6px;height:6px;background:var(--warm);border-radius:50%;animation:ty 1.2s infinite}
@keyframes ty{0%,80%,100%{opacity:.4}40%{transform:translateY(-4px);opacity:1}}
.input-area{background:#fff;border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;background:var(--cream);border:1.5px solid var(--border);border-radius:22px;padding:10px 16px}
textarea{width:100%;background:transparent;border:none;outline:none;font-family:inherit;font-size:14px;resize:none;max-height:100px}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
</style>
</head>
<body>
<div id="cw" style="display:flex;flex-direction:column;height:100%">
  <div class="header">
    <div class="avatar">🫁</div>
    <div class="header-info">
      <div class="header-name">Lucas · Pecho Libre</div>
      <div class="header-status"><span class="status-dot"></span>Disponible ahora</div>
    </div>
  </div>
  <div class="chat-area" id="ca"></div>
  <div class="input-area">
    <div class="input-wrap"><textarea id="mi" placeholder="Contame qué sentís..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea></div>
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<script>
const API = '/functions/chat';
let H = [], L = false, E = false;

window.onload = () => bm("Soy el asistente de Lucas de @pecholibre. ¿Qué estás sintiendo en este momento?");

function bm(t) {
  const a = document.getElementById('ca');
  const r = document.createElement('div');
  r.className = 'msg-row bot';
  r.innerHTML = `<div class="bot-av">🫁</div><div class="bubble bot">${t.replace(/\n/g,'<br>')}</div>`;
  a.appendChild(r); a.scrollTop = a.scrollHeight;
}

function um(t) {
  const a = document.getElementById('ca');
  const r = document.createElement('div');
  r.className = 'msg-row user';
  r.innerHTML = `<div class="bubble user">${t}</div>`;
  a.appendChild(r); a.scrollTop = a.scrollHeight;
}

function ty() {
  const r = document.createElement('div'); r.id = 'ti'; r.className = 'msg-row bot';
  r.innerHTML = `<div class="bot-av">🫁</div><div class="typing-bubble"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  document.getElementById('ca').appendChild(r);
}

async function send() {
  const i = document.getElementById('mi'), t = i.value.trim();
  if (!t || L) return; i.value = ''; um(t);
  H.push({ role: 'user', parts: [{ text: t }] });
  L = true; ty();
  try {
    const r = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ history: H }) });
    const d = await r.json();
    document.getElementById('ti').remove();
    if (d.error) throw new Error(d.error);
    const rep = d.reply;
    bm(rep); H.push({ role: 'model', parts: [{ text: rep }] });
    if (rep.toLowerCase().includes('7 minutos') && !E) {
        E = true;
        setTimeout(ec, 1000);
    }
  } catch (e) {
    document.getElementById('ti').remove();
    bm("Lo siento, hubo un problema técnico. ¿Podés volver a intentar?");
  } finally { L = false; }
}

function ec() {
  const a = document.getElementById('ca');
  const r = document.createElement('div'); r.className = 'msg-row bot';
  r.innerHTML = `<div class="bot-av">🫁</div><div class="ebook-card"><div class="ebook-title">Protocolo: Liberar el Pecho</div><p style="font-size:12px;opacity:.9">La secuencia completa para apagar la alarma corporal.</p><a href="https://lucasnazaro27.hotmart.host/pecho-libre" target="_blank" class="ebook-btn">Ver el Ebook →</a></div>`;
  a.appendChild(r); a.scrollTop = a.scrollHeight;
}
</script>
</body>
</html>
