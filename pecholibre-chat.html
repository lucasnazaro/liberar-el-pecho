<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas • Pecho Libre - Asistente IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #2d5a43; --bg-cream: #f4eee0; --text-dark: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-cream); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px; display: flex; align-items: center; gap: 15px; background: white; border-bottom: 1px solid #ddd; }
        .avatar { width: 45px; height: 45px; background: var(--primary-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user-message { align-self: flex-end; background-color: var(--primary-green); color: white; border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-start; background-color: white; color: var(--text-dark); border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-area { padding: 20px; background: white; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: var(--primary-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div class="avatar">L</div>
    <div>
        <div style="font-weight: 600;">Lucas • Pecho Libre</div>
        <div style="font-size: 12px; color: #4caf50;">● DISPONIBLE AHORA</div>
    </div>
</header>

<div id="chat-container">
    <div class="message bot-message">Hola, soy el asistente de Lucas. ¿Qué estás sintiendo en este momento?</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Contame qué sentís..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-message');
        input.value = '';

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Sos un asistente de Lucas Nazaro. Ayudá con empatía: " + text }] }]
                })
            });

            const data = await response.json();

            // Si hay un error en la API Key o Google, lo capturamos aquí
            if (data.error) {
                console.error("Error de Google:", data.error);
                throw new Error(data.error);
            }
            
            // Intentamos leer la respuesta de Gemini
            const botResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            
            if (botResponse) {
                addMessage(botResponse, 'bot-message');
            } else {
                throw new Error('No se recibió texto de la IA');
            }

        } catch (error) {
            console.error("Detalle:", error);
            addMessage("Perdón, tuve un problema al procesar. Intentá de nuevo.", 'bot-message');
        }
    }

    function addMessage(text, className) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = 'message ' + className;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
