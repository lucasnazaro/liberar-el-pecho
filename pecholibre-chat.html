<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pecho Libre — Asistente</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8;
  --cream2: #EDE8DE;
  --warm: #C8B89A;
  --text: #1A1410;
  --text2: #5C4F3D;
  --text3: #8C7B6A;
  --accent: #2D5A4B;
  --accent2: #3D7A63;
  --accent-light: rgba(45,90,75,.08);
  --bubble-user: #2D5A4B;
  --bubble-bot: #FFFFFF;
  --border: rgba(90,70,50,.12);
  --shadow: 0 2px 24px rgba(26,20,16,.08);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ─── NOISE TEXTURE ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
.header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
  box-shadow: 0 1px 12px rgba(26,20,16,.06);
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #4A9B7F);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-info { flex: 1; min-width: 0; }

.header-name {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 16px;
  color: var(--text);
  letter-spacing: -.2px;
}

.header-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--accent2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #4CAF50;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.6; transform:scale(.85); }
}

.header-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-light);
  border: 1px solid rgba(45,90,75,.15);
  padding: 4px 10px;
  border-radius: 100px;
}

/* ─── CHAT AREA ─── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  z-index: 1;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 2px; }

/* ─── DATE DIVIDER ─── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0;
}

.date-divider::before, .date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.date-divider span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1.5px;
  white-space: nowrap;
}

/* ─── MESSAGE ─── */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  opacity: 0;
  transform: translateY(10px);
  animation: msg-in .35s ease forwards;
}

@keyframes msg-in {
  to { opacity:1; transform:translateY(0); }
}

.msg-row.user { justify-content: flex-end; }
.msg-row.bot  { justify-content: flex-start; }

.bot-avatar-small {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #4A9B7F);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-bottom: 2px;
}

.bubble {
  max-width: min(75%, 340px);
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.65;
  position: relative;
}

.bubble.user {
  background: var(--bubble-user);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.bubble.bot {
  background: var(--bubble-bot);
  color: var(--text);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
}

.bubble.bot .bubble-time {
  color: var(--text3);
}

.bubble-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: .5px;
  margin-top: 5px;
  color: rgba(255,255,255,.55);
  text-align: right;
}

/* ─── EBOOK CTA CARD ─── */
.ebook-card {
  background: linear-gradient(135deg, #2D5A4B 0%, #1a3d31 100%);
  border-radius: 16px;
  padding: 20px;
  margin-top: 4px;
  color: #fff;
  max-width: min(80%, 360px);
  box-shadow: 0 4px 24px rgba(45,90,75,.3);
  animation: msg-in .4s ease forwards;
  opacity: 0;
}

.ebook-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
  margin-bottom: 8px;
}

.ebook-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 17px;
  line-height: 1.3;
  margin-bottom: 6px;
}

.ebook-sub {
  font-size: 12px;
  color: rgba(255,255,255,.7);
  line-height: 1.5;
  margin-bottom: 16px;
}

.ebook-features {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 18px;
}

.ebook-feature {
  font-size: 12px;
  color: rgba(255,255,255,.85);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.ebook-feature::before {
  content: '✓';
  color: #4CAF50;
  font-weight: bold;
  flex-shrink: 0;
  margin-top: 1px;
}

.ebook-price-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.ebook-price {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
}

.ebook-price span {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,.5);
  font-weight: 400;
  margin-left: 4px;
}

.ebook-btn {
  display: inline-block;
  background: #fff;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 100px;
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
  white-space: nowrap;
}

.ebook-btn:active { transform: scale(.97); }

/* ─── TYPING INDICATOR ─── */
.typing-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

.typing-bubble {
  background: var(--bubble-bot);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  box-shadow: var(--shadow);
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-dot {
  width: 6px;
  height: 6px;
  background: var(--warm);
  border-radius: 50%;
  animation: typing 1.2s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }

@keyframes typing {
  0%,80%,100% { transform: translateY(0); opacity:.4; }
  40% { transform: translateY(-5px); opacity:1; }
}

/* ─── QUICK REPLIES ─── */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 4px;
  animation: msg-in .4s ease .1s forwards;
  opacity: 0;
}

.qr-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 8px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  box-shadow: 0 1px 6px rgba(26,20,16,.06);
}

.qr-btn:hover, .qr-btn:active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* ─── INPUT AREA ─── */
.input-area {
  background: #fff;
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  align-items: flex-end;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  display: flex;
  align-items: flex-end;
  padding: 10px 16px;
  transition: border-color .2s;
}

.input-wrap:focus-within {
  border-color: var(--accent);
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  resize: none;
  max-height: 100px;
  line-height: 1.5;
  min-height: 20px;
}

textarea::placeholder { color: var(--text3); }

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .15s, background .2s;
  flex-shrink: 0;
}

.send-btn:hover { background: var(--accent2); }
.send-btn:active { transform: scale(.93); }
.send-btn:disabled { background: var(--cream2); cursor: not-allowed; }

.send-btn svg { width: 18px; height: 18px; }

/* ─── DISCLAIMER ─── */
.disclaimer {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  color: var(--text3);
  letter-spacing: .5px;
  padding: 6px 16px 2px;
  background: #fff;
  flex-shrink: 0;
}

/* ─── ERROR ─── */
.err-bubble {
  background: #FFF3F3;
  border: 1px solid #FFD0D0;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  color: #C0392B;
  max-width: 300px;
}

/* ─── RESPONSIVE ─── */
@media (min-width: 600px) {
  body { align-items: center; justify-content: center; background: var(--cream2); }
  .chat-wrapper {
    width: 420px;
    height: 85vh;
    max-height: 780px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(26,20,16,.18);
    display: flex;
    flex-direction: column;
    background: var(--cream);
  }
}
</style>
</head>

<script>
/* ─── SYSTEM PROMPT ─── */
const SYSTEM = `Sos el asistente de Lucas Nazaro, creador de @pecholibre. Hablás en primera persona del plural cuando te referís al método ("en el protocolo hacemos esto"), y usás el vos rioplatense.

MISIÓN: Escuchar los síntomas de la persona, validarlos desde el marco de Pecho Libre, darle una intervención real y gratuita del protocolo, y cuando el momento sea natural, presentar el ebook como el paso siguiente.

TU CONOCIMIENTO COMPLETO:

== MARCO CONCEPTUAL ==
La opresión en el pecho NO es un daño ni una amenaza. Es una señal fisiológica de activación del sistema nervioso autónomo. El cuerpo tiene dos estados: regulación (reposo) y activación (alerta). La opresión aparece cuando el cuerpo entra en activación y no encuentra vía de descarga.

El error que sostiene la opresión: la mente interpreta la sensación como peligro → más miedo → más activación → más opresión → más miedo. Este círculo se interrumpe cuando dejás de interpretar la sensación como amenaza.

Por qué "calmarse" no funciona: intentar controlar el cuerpo desde la mente falla porque el cuerpo aún percibe amenaza. El cuerpo no necesita control, necesita que dejes de interpretarlo como un problema.

Reencuadre clave: "Esto es activación corporal, no peligro. Mi cuerpo sabe volver al equilibrio."

== LOS 5 ERRORES QUE EMPEORAN TODO ==
1. Forzar que la sensación se vaya
2. Escanear el cuerpo obsesivamente
3. Buscar explicaciones durante la crisis
4. Respirar profundo o forzado (aumenta la presión)
5. Pelearte con el síntoma con frases como "esto no debería pasarme"

== PROTOCOLO DE EMERGENCIA (ABC) ==
A - Abrazo de Contención (30 seg): Cruzá los brazos y apoyá las manos en la parte exterior de los brazos. Presión firme pero no dolorosa. Sentís el límite de tu cuerpo.
B - Exhalación "Sss" (5 repeticiones): Inhalá por nariz, exhalá por boca haciendo "Sss" como neumático desinflándose. La exhalación debe ser el doble que la inhalación. Activa el nervio vago.
C - Expansión de Horizonte (60 seg): Sin mover la cabeza, suavizá la vista y captá la visión periférica. Identificá 3 objetos lejanos. La visión periférica es fisiológicamente incompatible con el pánico.

== REGULACIÓN FÍSICA (MÓDULO 4) ==
La sensación de que "falta el aire" no es falta de oxígeno, es exceso de aire atrapado. El diafragma se vuelve rígido bajo estrés.

Técnica "Gato sentado": Entrelazá las manos detrás de la nuca. Al inhalar, abrí los codos y mirá levemente arriba. Al exhalar, cerrá los codos y bajá la barbilla al pecho. 5 repeticiones.

Respiración de Vaciado Total: Inhalá en 3 tiempos por nariz. Exhalá por boca con labios casi cerrados durante 8 tiempos. El foco es sacar hasta la última gota.

Humming: Mano plana en el esternón. Inhalá suave. Al exhalar emitís "Mmmmmm". Estimula el nervio vago de forma inmediata.

== PROTOCOLO INVISIBLE (EN PÚBLICO) ==
1. Ajuste silencioso de postura (10 seg): pies apoyados firmes, soltá los hombros, dejá que el pecho caiga 1 cm.
2. Respiración disimulada (4 ciclos): solo por nariz, inhalación normal, exhalación un poco más lenta. No se ve ni se escucha.
3. Frase muda: "Estoy a salvo. Puedo seguir." Una sola vez.
4. Micro descarga (opcional): presioná suavemente los dedos de los pies contra el calzado 3 segundos y soltá.

== INTERRUPTOR DE ALARMA CORPORAL (para inicio de crisis) ==
1. Detención física (5 seg): detenés lo que estés haciendo.
2. Postura de estabilidad (15 seg): pies apoyados, espalda recta sin rigidez, hombros sueltos, mandíbula relajada.
3. Exhalación larga (3 veces): inhalá suave por nariz, exhalá por boca más lento. No profundo. Solo más largo al salir.
4. Frase interruptora: "No hay emergencia. Puedo seguir."

== PUNTOS DE ACUPRESIÓN (Guía Gratis) ==
1. Punto del Esternón: centro exacto del pecho, a la altura de las tetillas. Tres dedos, presión circular suave. Mientras presionás, inhalá por nariz y exhalá por boca haciendo "Haaaaa".
2. Hueco de la Clavícula: base del cuello, entre las dos clavículas. Un dedo, solo contacto. Imaginar que el aire entra y sale por ahí.
3. Ángulo de la Mandíbula: debajo del lóbulo de la oreja. Masaje suave hacia abajo siguiendo el cuello. Boca apenas entreabierta.

== RUTINA FINAL DE 7 MINUTOS ==
Fase 1 - Anclaje (min 1): Sentado, pies en el suelo. "Protocolo iniciado. Estoy a salvo."
Fase 2 - Apertura dinámica (min 2-4): 3 rotaciones de hombros hacia atrás. Respiración de Vaciado Total.
Fase 3 - Sello de Vago (min 5-7): Mano en esternón, otra en nuca. Inhalación suave, al exhalar zumbido prolongado. Últimos 30 seg: visión periférica.

== EBOOK Y BONUSES (presentar cuando sea natural) ==
El ebook "Liberar el Pecho en 7 Minutos" contiene los 5 módulos completos + 3 bonuses:
- Bonus 1: Interruptor de Alarma Corporal
- Bonus 2: Mapa de Señales Corporales (para saber si es falsa alarma o peligro real)
- Bonus 3: Protocolo Invisible (para aplicar en público sin que nadie lo note)
Link: https://lucasnazaro27.hotmart.host/pecho-libre

== CÓMO VENDER SIN VENDER ==
NO menciones el ebook antes de dar valor real. Primero escuchás, validás, das una técnica concreta. Cuando la persona siente algo de alivio o dice "gracias" o pregunta cómo seguir, AHÍ presentás el ebook así:
"Lo que hiciste ahora es solo el primer paso del protocolo completo. En el ebook junto los 5 módulos y los 3 bonuses en una secuencia que se hace en 7 minutos. Muchas personas que lo usan notan la diferencia desde el primer día."

JAMÁS uses frases como "transformá tu vida", "increíble herramienta", "sin más preámbulos". Tu voz es directa, cálida, precisa. Sin exclamaciones exageradas.

FORMATO DE RESPUESTAS:
- Máximo 3-4 párrafos por mensaje. En WhatsApp se lee corto.
- Usá saltos de línea para separar ideas.
- Sin listas con bullet points en el chat. Flujo conversacional.
- Si das una técnica, describila paso a paso con números.
- Emojis máximo 1-2 por mensaje y solo si son necesarios.`;

/* ─── STATE ─── */
let history = [];
let isLoading = false;
let ebookShown = false;
let msgCount = 0;

/* ─── INIT ─── */
window.addEventListener('load', () => {
  setTimeout(() => {
    addBotMessage("Hola, soy el asistente de Lucas de @pecholibre.\n\n¿Qué estás sintiendo?");
    setTimeout(() => showQuickReplies([
      "Opresión en el pecho",
      "Me falta el aire",
      "Ansiedad constante",
      "Nudo en la garganta",
      "Quiero saber más del protocolo"
    ]), 600);
  }, 400);

/* ─── RENDER HELPERS ─── */
function getTime() {
  return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

function addUserMessage(text) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="bubble user">
      ${escHtml(text)}
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function addBotMessage(text, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const area = document.getElementById('chatArea');
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML = `
        <div class="bot-avatar-small">🫁</div>
        <div class="bubble bot">
          ${escHtml(text)}
          <div class="bubble-time" style="color:var(--text3)">${getTime()}</div>
        </div>`;
      area.appendChild(row);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function showEbookCard() {
  if (ebookShown) return;
  ebookShown = true;
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.style.alignItems = 'flex-start';
  row.innerHTML = `
    <div class="bot-avatar-small">🫁</div>
    <div class="ebook-card" style="animation-delay:.1s">
      <div class="ebook-label">📘 Protocolo Completo</div>
      <div class="ebook-title">Liberar el Pecho en 7 Minutos</div>
      <div class="ebook-sub">La secuencia completa que une todo lo que hiciste ahora, en 5 módulos + 3 bonuses.</div>
      <div class="ebook-features">
        <div class="ebook-feature">Protocolo de emergencia paso a paso</div>
        <div class="ebook-feature">Regulación física sin pastillas</div>
        <div class="ebook-feature">Bonus: Protocolo Invisible (para usar en público)</div>
        <div class="ebook-feature">Bonus: Interruptor de Alarma Corporal</div>
        <div class="ebook-feature">Bonus: Mapa de Señales (falsa alarma vs peligro real)</div>
      </div>
      <div class="ebook-price-row">
        <div class="ebook-price">Ver protocolo<span>→</span></div>
        <a href="https://lucasnazaro27.hotmart.host/pecho-libre" target="_blank" class="ebook-btn">Quiero esto</a>
      </div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function showQuickReplies(options) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  wrap.id = 'quickReplies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      wrap.remove();
      handleUserInput(opt);
    };
    wrap.appendChild(btn);
  });
  area.appendChild(wrap);
  scrollBottom();
}

function removeQuickReplies() {
  const qr = document.getElementById('quickReplies');
  if (qr) qr.remove();
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingIndicator';
  row.innerHTML = `
    <div class="bot-avatar-small">🫁</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  area.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function escHtml(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

/* ─── SEND LOGIC ─── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';
  autoResize(input);
  handleUserInput(text);
}

async function handleUserInput(text) {
  removeQuickReplies();
  addUserMessage(text);
  history.push({ role: 'user', content: text });
  msgCount++;

  setLoading(true);
  showTyping();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);

    const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    history.push({ role: 'assistant', content: reply });

    hideTyping();

    // Detectar si la respuesta incluye presentación del ebook
    const mentionsEbook = reply.toLowerCase().includes('ebook') ||
                          reply.toLowerCase().includes('protocolo completo') ||
                          reply.toLowerCase().includes('7 minutos') ||
                          reply.toLowerCase().includes('hotmart');

    if (mentionsEbook && !ebookShown) {
      // Mostrar texto sin la parte del ebook (la card lo reemplaza)
      const cleanReply = reply.replace(/https?:\/\/[^\s]+/g, '').trim();
      await addBotMessage(cleanReply);
      setTimeout(() => showEbookCard(), 400);
    } else {
      await addBotMessage(reply);
    }

    // Auto mostrar ebook después de 4 intercambios si no se mostró
    if (msgCount >= 4 && !ebookShown) {
      setTimeout(() => showEbookCard(), 1000);
    }

  } catch(err) {
    hideTyping();
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `<div class="bot-avatar-small">🫁</div><div class="err-bubble">Hubo un problema de conexión. Intentá de nuevo.</div>`;
    area.appendChild(row);
    scrollBottom();
    history.pop();
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  isLoading = on;
  document.getElementById('sendBtn').disabled = on;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
